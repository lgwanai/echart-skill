<!--
  Template: graph/static.html
  Chart Type: Static Graph (静态位置关系图)
  Data Pattern: NODES_LINKS (nodes have explicit x, y positions)
  Data Format: { nodes: [{name, x, y, symbolSize?}, ...], links: [{source, target}, ...] }
  Covers: graph-simple, graph-grid, graph-life-expectancy (3 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  title: { text: {{TITLE}}, left: 'center' },
  tooltip: {},
  series: [{
    type: 'graph',
    layout: 'none',
    roam: true,
    symbolSize: {{SYMBOL_SIZE}},
    label: { show: {{LABEL_SHOW}}, position: 'right' },
    edgeSymbol: ['circle', 'arrow'],
    edgeSymbolSize: [4, 10],
    data: {{NODES}},
    links: {{LINKS}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
