<!--
  Template: graph/force.html
  Chart Type: Force Graph (力导向关系图)
  Data Pattern: NODES_LINKS
  Data Format: { nodes: [{id?, name, symbolSize?, category?, x?, y?}, ...], links: [{source, target, value?}, ...], categories?: [{name}, ...] }
  Covers: graph-force, graph-force2, graph-force-dynamic, graph-circular-layout,
          graph-label-overlap, graph-npm, graph-webkit-dep, graph (les-miserables), graphGL (8 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  title: { text: '{{TITLE}}', left: 'center' },
  tooltip: {},
  legend: {{LEGEND}},
  series: [{
    type: 'graph',
    layout: '{{LAYOUT}}',          // 'force' | 'circular' | 'none'
    roam: true,
    draggable: true,
    symbolSize: {{SYMBOL_SIZE}},   // number | function
    edgeSymbol: ['', 'arrow'],
    edgeSymbolSize: [4, 8],
    label: { show: {{LABEL_SHOW}}, position: 'right' },
    edgeLabel: { show: false, fontSize: 12 },
    force: {
      repulsion: {{REPULSION}},    // 100 ~ 500
      gravity: {{GRAVITY}},        // 0.1
      edgeLength: {{EDGE_LENGTH}}, // 30 ~ 200
      layoutAnimation: {{LAYOUT_ANIMATION}}
    },
    categories: {{CATEGORIES}},
    data: {{NODES}},
    links: {{LINKS}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
