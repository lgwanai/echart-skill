<!--
  Template: sunburst/basic.html
  Chart Type: Sunburst (旭日图)
  Data Pattern: HIERARCHY
  Data Format: [{name?: string, value?: number, itemStyle?: {}, children?: [...]}, ...]
  Covers: sunburst-simple, sunburst-borderRadius, sunburst-book, sunburst-drink,
          sunburst-label-rotate, sunburst-monochrome, sunburst-visualMap (7 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'item' },
  series: [{
    type: 'sunburst',
    radius: {{RADIUS}},           // [0, '90%']
    center: ['50%', '50%'],
    nodeClick: '{{NODE_CLICK}}',  // 'rootToNode' | 'link' | undefined
    emphasis: { focus: '{{FOCUS}}' },  // 'ancestor' | 'descendant'
    label: {
      show: {{LABEL_SHOW}},
      rotate: '{{ROTATE}}',       // 'radial' | 'tangential' | 0
      position: 'outside',
      minAngle: 3
    },
    itemStyle: { borderRadius: 4, borderWidth: 2, borderColor: '#fff' },
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
