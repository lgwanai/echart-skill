<!--
  Template: themeRiver/basic.html
  Chart Type: ThemeRiver (主题河流图)
  Data Pattern: XYZ_TRIPLES
  Data Format: [[dateString, value, seriesName], ...]
  Covers: themeRiver-basic, themeRiver-lastfm (2 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'axis' },
  legend: { data: {{LEGEND}} },
  singleAxis: { top: 50, bottom: 50, axisTick: {}, axisLabel: {}, type: 'time' },
  series: [{
    type: 'themeRiver',
    emphasis: { itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,0.8)' } },
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
