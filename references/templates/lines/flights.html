<!--
  Template: lines/flights.html
  Chart Type: Lines (飞线/迁徙图) — standalone lines without geo component
  Data Pattern: LINES_COORDS
  Data Format: { geoCoordMap: {"name": [lng,lat]}, flights: [[fromName, toName], ...] }
  Covers: lines-airline, lines-ny, lines-bmap, lines-bmap-bus, lines-bmap-effect (5 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var geoCoordMap = {{GEO_COORD_MAP}};
var flights = {{FLIGHTS}};  // [[fromName, toName, value?], ...]

var planePath = 'path://M1705.06,1318.313v-89.254l-319.9-221.799l0.073-208.063c0.521-84.662-26.629-121.796-63.961-121.491c-37.332-0.305-64.482,36.829-63.961,121.491l0.073,208.063l-319.9,221.799v89.254l330.343-157.288l12.238,241.308l-134.449,92.931l0.531,42.034l175.125-42.917l175.125,42.917l0.531-42.034l-134.449-92.931l12.238-241.308L1705.06,1318.313z';

var seriesData = flights.map(function(item) {
  return {
    coords: [geoCoordMap[item[0]], geoCoordMap[item[1]]],
    lineStyle: { width: Math.max(1, (item[2] || 1) / {{LINE_SCALE}}) }
  };
});

var option = {
  tooltip: { trigger: 'item' },
  geo: {
    map: '{{MAP_NAME}}', roam: true,
    itemStyle: { areaColor: '#323c48', borderColor: '#111' }
  },
  series: [{
    type: 'lines', coordinateSystem: 'geo',
    polyline: false, effect: { show: true, period: 6, trailLength: 0.7, symbol: planePath, symbolSize: 15 },
    lineStyle: { color: '#ffd54f', width: 1, opacity: 0.4, curveness: 0.2 },
    data: seriesData
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
