<!--
  Template: parallel/basic.html
  Chart Type: Parallel Coordinates (平行坐标图)
  Data Pattern: DATASET_SOURCE
  Data Format: [[dim1, dim2, dim3, ...], ...]  (parallelAxis defines each dimension)
  Covers: parallel-simple, parallel-aqi, parallel-nutrients (3 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  parallelAxis: {{PARALLEL_AXIS}},       // [{dim: 0, name: '...', type: 'value'}, ...]
  parallel: { left: '5%', right: '13%', bottom: '10%', top: '15%' },
  series: [{
    type: 'parallel',
    lineStyle: { width: 1.5, opacity: 0.6 },
    emphasis: { lineStyle: { width: 3, opacity: 0.8 } },
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
