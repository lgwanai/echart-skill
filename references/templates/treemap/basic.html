<!--
  Template: treemap/basic.html
  Chart Type: Treemap (矩形树图)
  Data Pattern: HIERARCHY
  Data Format: [{name: string, value?: number, children?: [...]}, ...]
  Covers: treemap-simple, treemap-drill-down, treemap-show-parent, treemap-visual,
          treemap-obama, treemap-disk, treemap-sunburst-transition (7 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'item' },
  series: [{
    type: 'treemap',
    roam: false,
    width: '100%', height: '100%',
    top: 0, left: 0, bottom: 0, right: 0,
    nodeClick: {{NODE_CLICK}},    // 'link' | 'zoomToNode' | false
    breadcrumb: { show: {{BREADCRUMB_SHOW}} !== false },
    label: { show: true, position: 'insideTopLeft' },
    upperLabel: { show: {{UPPER_LABEL_SHOW}} !== false, height: 30 },
    levels: [{
      itemStyle: { borderWidth: 3, borderColor: '#fff', gapBorderWidth: 1 },
      upperLabel: { show: true }
    }],
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
