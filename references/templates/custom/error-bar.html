<!--
  Template: custom/error-bar.html
  Chart Type: Error Bar (柱状图 + 误差线)
  Data Format: [[category, value, min, max], ...]
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var rawData = {{DATA}};
var cats = rawData.map(function(d){return d[0]});
var vals = rawData.map(function(d){return d[1]});
var errs = rawData.map(function(d){return [d[1]-d[2], d[3]-d[1]]});
var option = {
  tooltip: { trigger: 'axis' },
  grid: { left: '5%', right: '5%', bottom: '10%', top: '10%' },
  xAxis: { type: 'category', data: cats },
  yAxis: { type: 'value' },
  series: [
    { type: 'bar', data: vals, itemStyle: { color: '#5470c6' }, barWidth: '40%' },
    { type: 'bar', data: vals, barGap: '-100%', barWidth: '40%',
      itemStyle: { color: 'transparent' },
      markLine: { silent: true, symbol: ['none','none'],
        lineStyle: { color: '#333', type: 'solid', width: 1 },
        data: rawData.map(function(d,i){ return [{ yAxis: d[2], xAxis: i }, { yAxis: d[3], xAxis: i }] })
      }
    }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
