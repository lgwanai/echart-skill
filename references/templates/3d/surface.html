<!--
  Template: 3d/surface.html
  Chart Type: Surface (3D曲面图)
  Data Format: equation.z as JS function
  NOTE: Requires echarts-gl extension
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{GL_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: {},
  visualMap: { show: false, dimension: 2, min: -1, max: 1, inRange: { color: ['#313695','#4575b4','#74add1','#abd9e9','#e0f3f8','#ffffbf','#fee090','#fdae61','#f46d43','#d73027','#a50026'] } },
  xAxis3D: { type: 'value' },
  yAxis3D: { type: 'value' },
  zAxis3D: { type: 'value' },
  grid3D: { viewControl: { projection: {{PROJECTION}} } },
  series: [{
    type: 'surface',
    wireframe: { show: {{WIREFRAME}} },
    equation: {
      x: { step: 0.1 },
      y: { step: 0.1 },
      z: {{DATA_OR_EQUATION}}
    }
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
