<!--
  Template: 3d/bar3d.html
  Chart Type: Bar3D (3D柱状图)
  Data Pattern: XYZ_TRIPLES or DATASET_SOURCE
  Data Format: [[x, y, z], ...] or dataset.source: [[x, y, z], ...]
  Covers: bar3d-dataset, bar3d-global-population, bar3d-myth, bar3d-punch-card,
          bar3d-simplex-noise, bar3d-voxelize-image, image-to-bar3d, metal-bar3d,
          stacked-bar3d, transparent-bar3d, bar3d-noise-modified-from-marpi-demo (11 examples)
  NOTE: Requires echarts-gl extension
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{GL_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: {},
  visualMap: { max: {{VMAX}}, inRange: { color: ['#313695', '#4575b4', '#74add1', '#fee090', '#f46d43', '#d73027'] } },
  {{AXIS_3D}}
  series: [{
    type: 'bar3D',
    {{COORD_SYSTEM}}
    shading: 'realistic',
    barSize: {{BAR_SIZE}},
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
