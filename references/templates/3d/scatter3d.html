<!--
  Template: 3d/scatter3d.html
  Chart Type: Scatter3D (3D散点图)
  Data Pattern: XYZ_TRIPLES
  Data Format: [[x, y, z], ...]
  Covers: scatter3D-dataset, scatter3d-globe-population, scatter3d-orthographic,
          scatter3d-scatter, scatter3d-simplex-noise, scatterGL-gps, scattergl-weibo (7 examples)
  NOTE: Requires echarts-gl extension
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: {},
  {{AXIS_3D}}
  series: [{
    type: 'scatter3D',
    symbolSize: {{SYMBOL_SIZE}},
    data: {{DATA}},
    itemStyle: { opacity: 0.8 }
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
