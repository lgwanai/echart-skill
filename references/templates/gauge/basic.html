<!--
  Template: gauge/basic.html
  Chart Type: Gauge (仪表盘)
  Data Pattern: GAUGE_VALUE
  Data Format: { value: number, name?: string, max?: number }
  Covers: All 12 gauge examples (single value display)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:500px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { formatter: '{a}<br/>{b}: {c}' + '{{UNIT}}' },
  series: [{
    type: 'gauge',
    startAngle: {{START_ANGLE}},   // 180 (half) | 210 (car) | 225
    endAngle: {{END_ANGLE}},       // 0 (half) | -30 (car) | -45
    center: ['50%', '60%'],
    radius: '90%',
    min: {{MIN}},                   // 0
    max: {{MAX}},                   // 100
    progress: { show: {{PROGRESS_SHOW}}, width: 18 },  // true for progress style
    axisLine: { lineStyle: { width: {{AXIS_WIDTH}} } },  // 18 | 30
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: { show: {{LABEL_SHOW}} },
    detail: {
      valueAnimation: true,
      formatter: '{value}' + '{{UNIT}}',
      fontSize: 32,
      fontWeight: 'bold',
      offsetCenter: [0, '60%']
    },
    data: [{ value: {{VALUE}}, name: '{{NAME}}' }]
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
