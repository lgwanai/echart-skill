<!--
  Template: bar/waterfall.html
  Chart Type: Waterfall (瀑布图)
  Data Pattern: FLAT_ARRAY (3-series with stack: transparent helper + increase + decrease)
  Data Format: { categories: string[], increase: (number|null)[], decrease: (number|null)[] }
  Covers: bar-waterfall, bar-waterfall2 (2 examples)
  IMPORTANT: This template auto-computes the transparent helper series from increase/decrease data
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var rawIncrease = {{INCREASE}};
var rawDecrease = {{DECREASE}};
var categories = {{CATEGORIES}};

// Auto-compute waterfall helper (transparent base) and split positive/negative
var helper = [], positive = [], negative = [];
var sum = 0;
for (var i = 0; i < categories.length; i++) {
  var inc = rawIncrease[i], dec = rawDecrease[i];
  if (i === 0) {
    helper.push(0);
    positive.push(inc || 0);
    negative.push(dec ? Math.abs(dec) : '-');
  } else {
    sum += (rawIncrease[i-1] || 0) - (rawDecrease[i-1] || 0);
    helper.push(sum);
    positive.push(inc || '-');
    negative.push(dec ? Math.abs(dec) : '-');
  }
}

var option = {
  title: { text: '{{TITLE}}', left: 'center' },
  tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
  grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
  xAxis: { type: 'category', data: categories },
  yAxis: { type: 'value' },
  series: [
    { name: 'helper', type: 'bar', stack: 'total',
      itemStyle: { color: 'transparent', borderColor: 'transparent' },
      emphasis: { itemStyle: { color: 'transparent', borderColor: 'transparent' } },
      data: helper },
    { name: 'increase', type: 'bar', stack: 'total',
      itemStyle: { color: '#4CAF50' }, data: positive },
    { name: 'decrease', type: 'bar', stack: 'total',
      itemStyle: { color: '#F44336' }, data: negative }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
