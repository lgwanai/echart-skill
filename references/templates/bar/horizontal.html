<!--
  Template: bar/horizontal.html
  Chart Type: Horizontal Bar (横向柱状图)
  Data Pattern: FLAT_ARRAY (yAxis is category, xAxis is value)
  Data Format: { categories: string[], values: number[] }
  Covers: bar-y-category, bar-y-category-stack, bar-race (2 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
  grid: { left: '3%', right: '10%', bottom: '3%', containLabel: true },
  xAxis: { type: 'value' },
  yAxis: { type: 'category', data: {{CATEGORIES}}, inverse: true },
  series: [{
    type: 'bar',
    itemStyle: { borderRadius: [0, 4, 4, 0] },
    label: { show: true, position: 'right' },
    data: {{VALUES}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
