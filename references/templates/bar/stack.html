<!--
  Template: bar/stack.html
  Chart Type: Stacked Bar (堆叠柱状图)
  Data Pattern: FLAT_ARRAY (multi-series with stack property)
  Data Format: { categories: string[], series: [{name: string, stack: string, data: number[]}, ...] }
  Covers: bar-stack, bar-stack-borderRadius, bar-stack-normalization, bar-y-category-stack,
          bar-polar-stack, bar-polar-stack-radial (5 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
  legend: {},
  grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
  xAxis: { type: 'category', data: {{CATEGORIES}} },
  yAxis: { type: 'value' },
  series: {{SERIES}}
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
