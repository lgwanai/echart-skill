<!--
  Template: bar/basic.html
  Chart Type: Bar (柱状图)
  Data Pattern: FLAT_ARRAY
  Data Format: { categories: string[], values: number[] }
  Covers: bar-simple, bar-background, bar1, bar-brush, bar-gradient, bar-label-rotation,
          bar-tick-align, bar-animation-delay, bar-negative, bar-polar-*
          bar-breaks-*, bar-data-color, bar-rich-text (23 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'axis' },
  grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
  xAxis: { type: 'category', data: {{CATEGORIES}}, axisLabel: { rotate: {{ROTATE}} } },
  yAxis: { type: 'value' },
  series: [{
    type: 'bar',
    itemStyle: { borderRadius: [4, 4, 0, 0] },
    data: {{VALUES}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
