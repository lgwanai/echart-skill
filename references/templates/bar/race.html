<!--
  Template: bar/race.html
  Chart Type: Bar Race (动态排序柱状图)
  Data Pattern: FLAT_ARRAY (dynamic, yAxis category with inverse + realtimeSort)
  Data Format: { categories: string[], values: number[] }
  Covers: bar-race, bar-race-country (2 examples)
  Usage: Call updateData(newCategories, newValues) periodically to animate
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  xAxis: { max: 'dataMax' },
  yAxis: {
    type: 'category', data: {{CATEGORIES}}, inverse: true,
    animationDuration: 300, animationDurationUpdate: 300,
    max: {{MAX_DISPLAY}}
  },
  series: [{
    realtimeSort: true, type: 'bar',
    data: {{VALUES}},
    label: { show: true, position: 'right', valueAnimation: true }
  }],
  animationDuration: 0, animationDurationUpdate: 3000,
  animationEasing: 'linear', animationEasingUpdate: 'linear'
};
chart.setOption(option);
window.updateData = function(categories, values) {
  chart.setOption({ yAxis: { data: categories }, series: [{ data: values }] });
};
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
