<!--
  Template: line/area-pieces.html
  Chart Type: Area Pieces (折线图区域高亮)
  Data Format: [[date_string, value], ...] pairs
  Covers: area-pieces
  Matches official: https://echarts.apache.org/examples/zh/editor.html?c=area-pieces
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  xAxis: { type: 'category', boundaryGap: false },
  yAxis: { type: 'value', boundaryGap: [0, '30%'] },
  visualMap: {
    type: 'piecewise', show: false, dimension: 0, seriesIndex: 0,
    pieces: [ { gt: 1, lt: 3, color: 'rgba(0, 0, 180, 0.4)' }, { gt: 5, lt: 7, color: 'rgba(0, 0, 180, 0.4)' } ]
  },
  series: [{
    type: 'line', smooth: 0.6, symbol: 'none',
    lineStyle: { color: '#5470C6', width: 5 },
    markLine: { symbol: ['none','none'], label: { show: false }, data: [{ xAxis: 1 },{ xAxis: 3 },{ xAxis: 5 },{ xAxis: 7 }] },
    areaStyle: {},
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
