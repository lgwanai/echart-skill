<!--
  Template: line/step.html
  Chart Type: Step Line (阶梯折线图) — 3 series showing start/middle/end
  Data Format: {values_start: [], values_middle: [], values_end: []}
  Covers: line-step
  Matches: https://echarts.apache.org/examples/zh/editor.html?c=line-step
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  title: { text: {{TITLE}} },
  tooltip: { trigger: 'axis' },
  legend: { data: ['Step Start', 'Step Middle', 'Step End'] },
  grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
  xAxis: { type: 'category', data: {{CATEGORIES}} },
  yAxis: { type: 'value' },
  series: [
    { name: 'Step Start', type: 'line', step: 'start', data: {{VALUES_START}} },
    { name: 'Step Middle', type: 'line', step: 'middle', data: {{VALUES_MIDDLE}} },
    { name: 'Step End', type: 'line', step: 'end', data: {{VALUES_END}} }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
