<!--
  Template: pie/basic.html
  Chart Type: Pie (饼图)
  Data Pattern: NAMED_VALUE
  Data Format: [{name: string, value: number}, ...]
  Covers: pie-simple, pie-borderRadius, pie-padAngle, pie-rich-text, pie-legend,
          pie-nest (outer), pie-custom, pie-alignTo, pie-labelLine-adjust, pie-pattern,
          pie-parliament-transition (15 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
  legend: { orient: 'vertical', right: 10, top: 'center' },
  series: [{
    type: 'pie',
    radius: {{RADIUS}},       // '60%' for pie, ['40%','70%'] for doughnut
    roseType: {{ROSE_TYPE}} || false,     // false | 'radius' | 'area'
    center: ['50%', '50%'],
    itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },
    label: { show: {{LABEL_SHOW}} },      // true | false
    emphasis: { label: { show: true, fontSize: 20, fontWeight: 'bold' } },
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
