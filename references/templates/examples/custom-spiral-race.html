<!-- custom-spiral-race — https://echarts.apache.org/examples/zh/editor.html?c=custom-spiral-race -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
var option = {
  animationDuration: _animationDuration,
  animationDurationUpdate: _animationDurationUpdate,
  animationEasingUpdate: _animationEasingUpdate,
  dataset: {
    source: _datasourceList[_currentDataIndex]
  },
  tooltip: {},
  angleAxis: {
    type: 'value',
    splitArea: { show: true },
    axisLabel: {
      formatter: function (val) {
        return _radianLabels[val];
      },
      color: 'rgba(0,0,0,0.2)'
    },
    axisLine: { lineStyle: { color: 'rgba(0,0,0,0.2)' } },
    min: 0,
    max: _valOnRoundRadian
  },
  radiusAxis: {
    type: 'value',
    interval: 1,
    splitLine: { show: false },
    axisLabel: {
      color: 'rgba(0,0,0,0.6)',
      formatter: function (value) {
        return _barNamesByOrdinal[value] || '';
      }
    },
    axisTick: { show: false },
    axisLine: { lineStyle: { color: 'rgba(0,0,0,0.2)' } },
    min: 0,
    max: getMaxRadius()
  },
  polar: {},
  series: [
    {
      type: 'custom',
      coordinateSystem: 'polar',
      renderItem: renderItem
    }
  ]
};
chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
