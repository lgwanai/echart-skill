<!-- lines3d-flights-on-geo3d — https://echarts.apache.org/examples/zh/editor.html?c=lines3d-flights-on-geo3d -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{GL_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
    geo3D: {
      map: 'world',
      shading: 'color',
      environment: ROOT_PATH + '/data-gl/asset/starfield.jpg',
      silent: true,
      groundPlane: {
        show: false
      },
      light: {
        main: {
          intensity: 0
        },
        ambient: {
          intensity: 0
        }
      },
      viewControl: {
        distance: 50
      },
      itemStyle: {
        color: '#111'
      },
      boxHeight: 0.5
    },
    series: [
      {
        type: 'lines3D',
        coordinateSystem: 'geo3D',
        effect: {
          show: true,
          trailWidth: 2,
          trailLength: 0.2
        },
        blendMode: 'lighter',
        lineStyle: {
          width: 0,
          color: 'rgb(50, 50, 150)',
          opacity: 0.2
        },
        data: routes
      }
    ]
  });
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
