<!-- geo-svg-map -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
var option = {
      tooltip: {
        formatter: function (params) {
          console.log(params);
          return [
            params.name + ':',
            'xxxxxxxxxxxxxxxx',
            'xxxxxxxxxxxxxxxx',
            'xxxxxxxxxxxxxxxx'
          ].join('<br>');
        }
      },
      geo: [
        {
          map: 'sicily',
          roam: true,
          layoutCenter: ['50%', '50%'],
          layoutSize: '100%',
          selectedMode: 'single',
          tooltip: {
            show: true,
            confine: true,
            formatter: function (params) {
              return [
                'This is the introduction:',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx',
                'xxxxxxxxxxxxxxxxxxxxx'
              ].join('<br>');
            }
          },
          itemStyle: {
            color: undefined
          },
          emphasis: {
            label: {
              show: false
            }
          },
          select: {
            itemStyle: {
              color: '#b50205'
            },
            label: {
              show: false
            }
          },
          regions: [
            {
              name: 'route1',
              itemStyle: {
                borderWidth: 0
              },
              select: {
                itemStyle: {
                  color: '#b5280d',
                  borderWidth: 0
                }
              },
              tooltip: {
                position: 'right',
                alwaysShowContent: true,
                enterable: true,
                extraCssText: 'user-select: text',
                formatter: [
                  'Route 1:',
                  'xxxxxxxxxxxxxxxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxxxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxxxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxxxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxxxxxxxxxxxxxxx'
                ].join('<br>')
              }
            },
            {
              name: 'route2',
              itemStyle: {
                borderWidth: 0
              },
              select: {
                itemStyle: {
                  color: '#b5280d',
                  borderWidth: 0
                }
              },
              tooltip: {
                position: 'left',
                alwaysShowContent: true,
                enterable: true,
                extraCssText: 'user-select: text',
                formatter: [
                  'Route 2:',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx',
                  'xxxxxxxxxxxxxx'
                ].join('<br>')
              }
            }
          ]
        }
      ],
      // -------------
      // Make buttons
      grid: {
        top: 10,
        left: 'center',
        width: 80,
        height: 20
      },
      xAxis: {
        axisLine: { show: false },
        splitLine: { show: false },
        axisLabel: { show: false },
        axisTick: { show: false }
      },
      yAxis: {
        axisLine: { show: false },
        splitLine: { show: false },
        axisLabel: { show: false },
        axisTick: { show: false }
      },
      series: {
        type: 'scatter',
        itemStyle: {},
        label: {
          show: true,
          borderColor: '#999',
          borderWidth: 1,
          borderRadius: 2,
          backgroundColor: '#fff',
          padding: [3, 5],
          fontSize: 18,
          opacity: 1,
          color: '#333'
        },
        encode: {
          label: 2
        },
        symbolSize: 0,
        tooltip: { show: false },
        selectedMode: 'single',
        select: {
          label: {
            color: '#fff',
            borderColor: '#555',
            backgroundColor: '#555'
          }
        },
        data: [
          [0, 0, 'route1'],
          [1, 0, 'route2']
        ]
      }
      // Make buttons end
      // -----------------
    };
chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
