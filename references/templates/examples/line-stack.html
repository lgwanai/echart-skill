<!-- line-stack — https://echarts.apache.org/examples/zh/editor.html?c=line-stack -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  title: {
    text: 'Stacked Line'
  },
  tooltip: {
    trigger: 'axis'
  },
  legend: {
    data: {{DATA}}
  },
  grid: {
    left: '3%',
    right: '4%',
    bottom: '3%',
    containLabel: true
  },
  toolbox: {
    feature: {
      saveAsImage: {}
    }
  },
  xAxis: {
    type: 'category',
    boundaryGap: false,
    data: {{DATA}}
  },
  yAxis: {
    type: 'value'
  },
  series: [
    {
      name: 'Email',
      type: 'line',
      stack: 'Total',
      data: {{DATA}}
    },
    {
      name: 'Union Ads',
      type: 'line',
      stack: 'Total',
      data: {{DATA}}
    },
    {
      name: 'Video Ads',
      type: 'line',
      stack: 'Total',
      data: {{DATA}}
    },
    {
      name: 'Direct',
      type: 'line',
      stack: 'Total',
      data: {{DATA}}
    },
    {
      name: 'Search Engine',
      type: 'line',
      stack: 'Total',
      data: {{DATA}}
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
