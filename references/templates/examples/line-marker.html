<!-- line-marker — https://echarts.apache.org/examples/zh/editor.html?c=line-marker -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  title: {
    text: 'Temperature Change in the Coming Week'
  },
  tooltip: {
    trigger: 'axis'
  },
  legend: {},
  toolbox: {
    show: true,
    feature: {
      dataZoom: {
        yAxisIndex: 'none'
      },
      dataView: { readOnly: false },
      magicType: { type: ['line', 'bar'] },
      restore: {},
      saveAsImage: {}
    }
  },
  xAxis: {
    type: 'category',
    boundaryGap: false,
    data: {{DATA}}
  },
  yAxis: {
    type: 'value',
    axisLabel: {
      formatter: '{value} °C'
    }
  },
  series: [
    {
      name: 'Highest',
      type: 'line',
      data: {{DATA}},
      markPoint: {
        data: {{DATA}}
      },
      markLine: {
        data: {{DATA}}
      }
    },
    {
      name: 'Lowest',
      type: 'line',
      data: {{DATA}},
      markPoint: {
        data: {{DATA}}
      },
      markLine: {
        data: {{DATA}}
        ]
      }
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
