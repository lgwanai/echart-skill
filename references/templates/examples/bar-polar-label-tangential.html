<!-- bar-polar-label-tangential — https://echarts.apache.org/examples/zh/editor.html?c=bar-polar-label-tangential -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  title: [
    {
      text: 'Tangential Polar Bar Label Position (middle)'
    }
  ],
  polar: {
    radius: [30, '80%']
  },
  angleAxis: {
    max: 4,
    startAngle: 75
  },
  radiusAxis: {
    type: 'category',
    data: {{DATA}}
  },
  tooltip: {},
  series: {
    type: 'bar',
    data: {{DATA}},
    coordinateSystem: 'polar',
    label: {
      show: true,
      position: 'middle',
      formatter: '{b}: {c}'
    }
  }
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
