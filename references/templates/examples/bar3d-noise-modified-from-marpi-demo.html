<!-- bar3d-noise-modified-from-marpi-demo — https://echarts.apache.org/examples/zh/editor.html?c=bar3d-noise-modified-from-marpi-demo -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->
<!-- {{GL_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
        toolbox: {
          left: 20,
          iconStyle: {
            normal: {
              borderColor: '#fff'
            }
          }
        },
        tooltip: {},
        visualMap: {
          show: false,
          min: 0.1,
          max: 2.5,
          inRange: {
            color: ['#000', '#300', '#fff']
          }
        },
        xAxis3D: {
          type: 'value'
        },
        yAxis3D: {
          type: 'value'
        },
        zAxis3D: {
          type: 'value',
          min: -6,
          max: 6
        },
        grid3D: {
          show: false,
          environment: '#000',
          viewControl: {
            distance: 100,
            maxDistance: 150,
            minDistance: 50,
            alpha: 38,
            beta: 220,
            minAlpha: 10
            //maxBeta: 360,
          },
          postEffect: {
            enable: true,
            SSAO: {
              enable: true,
              intensity: 1.3,
              radius: 5
            },
            screenSpaceReflection: {
              enable: false
            },
            depthOfField: {
              enable: true,
              blurRadius: blurRadius,
              focalRange: focalRange,
              focalDistance: 70
            }
          },
          light: {
            main: {
              intensity: 1,
              shadow: true,
              shadowQuality: 'high',
              alpha: 30
            },
            ambient: {
              intensity: 0
            },
            ambientCubemap: {
              texture: ROOT_PATH + '/data-gl/asset/pisa.hdr',
              exposure: 2,
              diffuseIntensity: 1,
              specularIntensity: 1
            }
          }
        },
        series: [
          {
            type: 'bar3D',
            silent: true,
            shading: 'realistic',
            realisticMaterial: {
              roughness: 0.5,
              metalness: 0
            },
            instancing: true,
            barSize: 0.6,
            data: [],
            lineStyle: {
              width: 4
            },
            itemStyle: {
              color: '#fff'
            },
            animation: false,
            animationDurationUpdate: UPDATE_DURATION
          }
        ]
      });
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
