<!-- graphgl-gpu-layout — https://echarts.apache.org/examples/zh/editor.html?c=graphgl-gpu-layout -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart = echarts.init(document.getElementById("main"));
function createNodes(widthCount, heightCount) {
  var nodes = [];
  for (var i = 0; i < widthCount; i++) {
    for (var j = 0; j < heightCount; j++) {
      nodes.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        value: 1
      });
    }
  }
  return nodes;
}
function createEdges(widthCount, heightCount) {
  var edges = [];
  for (var i = 0; i < widthCount; i++) {
    for (var j = 0; j < heightCount; j++) {
      if (i < widthCount - 1) {
        edges.push({
          source: i + j * widthCount,
          target: i + 1 + j * widthCount,
          value: 1
        });
      }
      if (j < heightCount - 1) {
        edges.push({
          source: i + j * widthCount,
          target: i + (j + 1) * widthCount,
          value: 1
        });
      }
    }
  }
  return edges;
}
var nodes = createNodes(50, 50);
var edges = createEdges(50, 50);
option = {
  series: [
    {
      type: 'graphGL',
      nodes: nodes,
      edges: edges,
      itemStyle: {
        color: 'rgba(255,255,255,0.8)'
      },
      lineStyle: {
        color: 'rgba(255,255,255,0.8)',
        width: 3
      },
      forceAtlas2: {
        steps: 5,
        jitterTolerence: 10,
        edgeWeightInfluence: 4
      }
    }
  ]
};
if(typeof option !== "undefined") chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
