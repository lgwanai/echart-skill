<!-- chord-style — https://echarts.apache.org/examples/zh/editor.html?c=chord-style -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  tooltip: {},
  legend: {},
  series: [
    {
      type: 'chord',
      padAngle: 1,
      center: ['50%', '48%'],
      radius: ['70%', '80%'],
      data: {{DATA}},
      itemStyle: {
        borderRadius: [0, 15],
        borderWidth: 2,
        borderColor: '#fff'
      },
      lineStyle: {
        opacity: 0.3,
        color: 'gradient' // or 'source' (default), 'target'
      },
      emphasis: {
        focus: 'self' // or 'none', 'adjacency' (default)
      },
      label: {
        show: true,
        position: 'inside',
        color: '#fff',
        fontWeight: 'bold'
      },
      links: [
        { source: 'A', target: 'B', value: 14 },
        { source: 'A', target: 'C', value: 8 },
        { source: 'B', target: 'C', value: 20 },
        { source: 'B', target: 'E', value: 15 },
        { source: 'C', target: 'B', value: 8 },
        { source: 'C', target: 'E', value: 3 },
        { source: 'D', target: 'A', value: 12 },
        { source: 'D', target: 'B', value: 3 },
        { source: 'E', target: 'A', value: 15 },
        { source: 'E', target: 'C', value: 5 },
        { source: 'F', target: 'C', value: 5 },
        { source: 'G', target: 'A', value: 6 },
        { source: 'G', target: 'B', value: 8 },
        { source: 'G', target: 'D', value: 4 }
      ]
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
