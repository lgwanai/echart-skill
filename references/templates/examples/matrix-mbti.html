<!-- matrix-mbti — https://echarts.apache.org/examples/zh/editor.html?c=matrix-mbti -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
var option = {
  backgroundColor: '#F0F7F9',
  textStyle: {
    fontFamily
  },
  title: {
    text: 'MBTI Partner Compatibility',
    subtext:
      'Data from: https://www.personalitydata.org/16-types/enfj-relationships#partner-matrix',
    sublink:
      'https://www.personalitydata.org/16-types/enfj-relationships#partner-matrix',
    left: 'center',
    top: 5,
    textStyle: {
      fontSize: 20,
      color: '#57576A'
    },
    itemGap: 5
  },
  tooltip: {
    formatter: (params) => {
      return `<span style="color:${getColor(
        params.value[1]
      )};font-weight:bold">${params.value[1]}</span> /
                            <span style="color:${getColor(
                              params.value[0]
                            )};font-weight:bold">${params.value[0]}</span> :
                            ${Math.round(params.value[2] * 100)}%`;
    },
    borderColor: '#eee',
    padding: [2, 8]
  },
  matrix: {
    x: {
      data: xData,
      itemStyle: {
        borderColor: 'transparent',
        borderWidth: 0
      },
      dividerLineStyle: {
        width: 0
      },
      label: {
        fontFamily
      },
      levels: [
        {
          levelSize: 25
        },
        {
          levelSize: 30
        }
      ]
    },
    y: {
      data: yData,
      itemStyle: {
        borderColor: 'transparent',
        borderWidth: 0
      },
      dividerLineStyle: {
        width: 0
      },
      label: {
        fontFamily
      }
    },
    body: {
      itemStyle: {
        borderWidth: 0
      },
      label: {
        fontFamily
      }
    },
    width: size,
    height: size,
    left: (window.innerWidth - size) / 2,
    top: 50,
    backgroundStyle: {
      color: 'transparent',
      borderColor: 'transparent',
      borderWidth: 0
    }
  },
  visualMap: [
    {
      type: 'continuous',
      min: 0,
      max: 1,
      dimension: 2,
      calculable: true,
      orient: 'horizontal',
      top: 5,
      left: 'center',
      inRange: {
        opacity: [0, 1]
      },
      seriesIndex: [0, 2],
      show: false
    }
  ],
  series: detailSeries,
  aria: {
    enabled: true,
    decal: {
      show: true
    }
  },
  animation: 0
};
chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
