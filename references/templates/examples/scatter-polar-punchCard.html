<!-- scatter-polar-punchCard — https://echarts.apache.org/examples/zh/editor.html?c=scatter-polar-punchCard -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  title: {
    text: 'Punch Card of Github'
  },
  legend: {
    data: {{DATA}},
    left: 'right'
  },
  polar: {},
  tooltip: {
    formatter: function (params) {
      return (
        params.value[2] +
        ' commits in ' +
        hours[params.value[1]] +
        ' of ' +
        days[params.value[0]]
      );
    }
  },
  angleAxis: {
    type: 'category',
    data: hours,
    boundaryGap: false,
    splitLine: {
      show: true
    },
    axisLine: {
      show: false
    }
  },
  radiusAxis: {
    type: 'category',
    data: days,
    axisLine: {
      show: false
    },
    axisLabel: {
      rotate: 45
    }
  },
  series: [
    {
      name: 'Punch Card',
      type: 'scatter',
      coordinateSystem: 'polar',
      symbolSize: function (val) {
        return val[2] * 2;
      },
      data: data,
      animationDelay: function (idx) {
        return idx * 5;
      }
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
