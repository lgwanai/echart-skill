<!-- bar1 — https://echarts.apache.org/examples/zh/editor.html?c=bar1 -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  title: {
    text: 'Rainfall vs Evaporation',
    subtext: 'Fake Data'
  },
  tooltip: {
    trigger: 'axis'
  },
  legend: {
    data: {{DATA}}
  },
  toolbox: {
    show: true,
    feature: {
      dataView: { show: true, readOnly: false },
      magicType: { show: true, type: ['line', 'bar'] },
      restore: { show: true },
      saveAsImage: { show: true }
    }
  },
  calculable: true,
  xAxis: [
    {
      type: 'category',
      // prettier-ignore
      data: {{DATA}}
    }
  ],
  yAxis: [
    {
      type: 'value'
    }
  ],
  series: [
    {
      name: 'Rainfall',
      type: 'bar',
      data: {{DATA}},
      markPoint: {
        data: {{DATA}}
      },
      markLine: {
        data: {{DATA}}
      }
    },
    {
      name: 'Evaporation',
      type: 'bar',
      data: {{DATA}},
      markPoint: {
        data: {{DATA}}
      },
      markLine: {
        data: {{DATA}}
      }
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
