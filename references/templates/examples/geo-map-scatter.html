<!DOCTYPE html>

<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));

    min: 0,
    max: 1500,
    left: 'left',
    top: 'bottom',
    text: ['High', 'Low'],

        areaColor: null,
        shadowOffsetX: 0,
        shadowOffsetY: 0,
        shadowBlur: 20,
        borderWidth: 0,
