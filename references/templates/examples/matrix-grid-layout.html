<!-- matrix-grid-layout — https://echarts.apache.org/examples/zh/editor.html?c=matrix-grid-layout -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  // Use the matrix coordinate system to layout the charts and components.
  matrix: {
    x: { show: false, data: {{DATA}} },
    y: { show: false, data: {{DATA}} },
    body: {
      itemStyle: { borderColor: 'none' }
    },
    backgroundStyle: { borderColor: 'none' },
    top: 0,
    bottom: 0,
    left: 0,
    right: 0
  },
  tooltip: {}
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
