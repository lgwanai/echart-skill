<!-- custom-polar-heatmap — https://echarts.apache.org/examples/zh/editor.html?c=custom-polar-heatmap -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  legend: {
    data: {{DATA}}
  },
  polar: {},
  tooltip: {},
  visualMap: {
    type: 'continuous',
    min: 0,
    max: maxValue,
    top: 'middle',
    dimension: 2,
    calculable: true
  },
  angleAxis: {
    type: 'category',
    data: hours,
    boundaryGap: false,
    splitLine: {
      show: true,
      lineStyle: {
        color: '#ddd',
        type: 'dashed'
      }
    },
    axisLine: {
      show: false
    }
  },
  radiusAxis: {
    type: 'category',
    data: days,
    z: 100
  },
  series: [
    {
      name: 'Punch Card',
      type: 'custom',
      coordinateSystem: 'polar',
      renderItem: function (params, api) {
        var values = [api.value(0), api.value(1)];
        var coord = api.coord(values);
        var size = api.size([1, 1], values);
        return {
          type: 'sector',
          shape: {
            cx: params.coordSys.cx,
            cy: params.coordSys.cy,
            r0: coord[2] - size[0] / 2,
            r: coord[2] + size[0] / 2,
            startAngle: -(coord[3] + size[1] / 2),
            endAngle: -(coord[3] - size[1] / 2)
          },
          style: api.style({
            fill: api.visual('color')
          })
        };
      },
      data: data
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
