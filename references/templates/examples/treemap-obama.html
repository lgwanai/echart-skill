<!-- treemap-obama -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
var option = {
        title: {
          top: 5,
          left: 'center',
          text: 'How $3.7 Trillion is Spent',
          subtext: 'Obama’s 2012 Budget Proposal'
        },
        legend: {
          data: modes,
          selectedMode: 'single',
          top: 55,
          itemGap: 5,
          borderRadius: 5
        },
        tooltip: {},
        series: modes.map(function (mode, idx) {
          let seriesOpt = createSeriesCommon(idx);
          seriesOpt.name = mode;
          seriesOpt.top = 80;
          seriesOpt.visualDimension = idx === 2 ? 2 : undefined;
          seriesOpt.data = buildData(idx, obama_budget_2012);
          seriesOpt.levels = getLevelOption(idx);
          return seriesOpt;
        })
      };
chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
