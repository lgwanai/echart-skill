<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
chart.setOption({
  title: {
    text: 'Scatter with Jittering'
  },
  grid,
  xAxis: {
    type: 'category',
    jitter: (width / 7) * 0.8,
    data: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
  },
  yAxis: {
    type: 'value',
    max: 10,
    min: 0
  },
  series: [
    {
      name: 'Sleeping Hours',
      type: 'scatter',
      data,
      colorBy: 'data',
      itemStyle: {
        opacity: 0.4
      }
    }
  ]
});
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
