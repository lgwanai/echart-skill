const data = [];
for (let day = 0; day < 7; ++day) {
  for (let i = 0; i < 1000; ++i) {
    const y = Math.tan(i) / 2 + 7;
    data.push([day, y, Math.random()]);
  }
}
option = {

  },
  grid,
  xAxis: {
    type: 'category',
    jitter: (width / 7) * 0.8,

  },
  yAxis: {
    type: 'value',
    max: 10,
    min: 0
  },
  series: [
    {
      name: 'Sleeping Hours',
      type: 'scatter',
      data,
      colorBy: 'data',
      itemStyle: {
        opacity: 0.4
      }
    }
  ]
};
if(typeof option !== "undefined") chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
