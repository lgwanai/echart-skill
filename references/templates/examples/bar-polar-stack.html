<!-- bar-polar-stack — https://echarts.apache.org/examples/zh/editor.html?c=bar-polar-stack -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  angleAxis: {},
  radiusAxis: {
    type: 'category',
    data: {{DATA}},
    z: 10
  },
  polar: {},
  series: [
    {
      type: 'bar',
      data: {{DATA}},
      coordinateSystem: 'polar',
      name: 'A',
      stack: 'a',
      emphasis: {
        focus: 'series'
      }
    },
    {
      type: 'bar',
      data: {{DATA}},
      coordinateSystem: 'polar',
      name: 'B',
      stack: 'a',
      emphasis: {
        focus: 'series'
      }
    },
    {
      type: 'bar',
      data: {{DATA}},
      coordinateSystem: 'polar',
      name: 'C',
      stack: 'a',
      emphasis: {
        focus: 'series'
      }
    }
  ],
  legend: {
    show: true,
    data: {{DATA}}
  }
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
