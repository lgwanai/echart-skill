<!-- calendar-lunar — https://echarts.apache.org/examples/zh/editor.html?c=calendar-lunar -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  tooltip: {
    formatter: function (params) {
      return '降雨量: ' + params.value[1].toFixed(2);
    }
  },
  visualMap: {
    show: false,
    min: 0,
    max: 300,
    calculable: true,
    seriesIndex: [2],
    orient: 'horizontal',
    left: 'center',
    bottom: 20,
    inRange: {
      color: ['#e0ffff', '#006edd'],
      opacity: 0.3
    },
    controller: {
      inRange: {
        opacity: 0.5
      }
    }
  },
  calendar: [
    {
      left: 'center',
      top: 'middle',
      cellSize: [70, 70],
      yearLabel: { show: false },
      orient: 'vertical',
      dayLabel: {
        firstDay: 1,
        nameMap: 'cn'
      },
      monthLabel: {
        show: false
      },
      range: '2017-03'
    }
  ],
  series: [
    {
      type: 'scatter',
      coordinateSystem: 'calendar',
      symbolSize: 0,
      label: {
        show: true,
        formatter: function (params) {
          var d = echarts.number.parseDate(params.value[0]);
          return d.getDate() + '\n\n' + params.value[2] + '\n\n';
        },
        color: '#000'
      },
      data: lunarData,
      silent: true
    },
    {
      type: 'scatter',
      coordinateSystem: 'calendar',
      symbolSize: 0,
      label: {
        show: true,
        formatter: function (params) {
          return '\n\n\n' + (params.value[3] || '');
        },
        fontSize: 14,
        fontWeight: 700,
        color: '#a00'
      },
      data: lunarData,
      silent: true
    },
    {
      name: '降雨量',
      type: 'heatmap',
      coordinateSystem: 'calendar',
      data: heatmapData
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
