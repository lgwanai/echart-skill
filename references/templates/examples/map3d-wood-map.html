<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
chart.setOption({
    series: [
      {
        type: 'map3D',
        map: 'world',
        shading: 'realistic',
        realisticMaterial: {
          roughness: ROOT_PATH + '/data-gl/asset/wood/roughness.jpg',
          normalTexture: ROOT_PATH + '/data-gl/asset/wood/normal.jpg',
          detailTexture: ROOT_PATH + '/data-gl/asset/wood/diffuse.jpg',
          textureTiling: [2, 2]
        },
        postEffect: {
          enable: true,
          SSAO: {
            enable: true,
            radius: 3,
            intensity: 1.4,
            quality: 'high'
          }
        },
        light: {
          main: {
            intensity: 2,
            shadow: true,
            shadowQuality: 'high',
            alpha: 150,
            beta: 0
          },
          ambient: {
            intensity: 0
          },
          ambientCubemap: {
            diffuseIntensity: 2,
            specularIntensity: 2,
            texture: ROOT_PATH + '/data-gl/asset/canyon.hdr'
          }
        },
        viewControl: {
          alpha: 89,
          rotateMouseButton: 'right',
          panMouseButton: 'left',
          distance: 80
        },
        groundPlane: {
          show: true,
          color: '#333',
          realisticMaterial: {
            roughness: ROOT_PATH + '/data-gl/asset/redbricks/roughness.jpg',
            normalTexture: ROOT_PATH + '/data-gl/asset/redbricks/normal.jpg',
            detailTexture: ROOT_PATH + '/data-gl/asset/redbricks/diffuse.jpg',
            textureTiling: [8, 4]
          }
        },
        data: regionData
      }
    ]
  });
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
