<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
chart.setOption({
  xAxis: {
    scale: true
  },
  yAxis: {
    scale: true
  },
  series: [
    {
      type: 'scatter',
      id: 'female',
      dataGroupId: 'female',
      universalTransition: {
        enabled: true,
        delay: function (idx, count) {
          return Math.random() * 400;
        }
      },
      data: femaleData
    },
    {
      type: 'scatter',
      id: 'male',
      dataGroupId: 'male',
      universalTransition: {
        enabled: true,
        delay: function (idx, count) {
          return Math.random() * 400;
        }
      },
      data: maleDeta
    }
  ]
});
const barOption = {
  xAxis: {
    type: 'category',
    data: ['Female', 'Male']
  },
  yAxis: {},
  series: [
    {
      type: 'bar',
      id: 'total',
      data: [
        {
          value: calculateAverage(maleDeta, 0),
          groupId: 'male'
        },
        {
          value: calculateAverage(femaleData, 0),
          groupId: 'female'
        }
      ],
      universalTransition: {
        enabled: true,
        seriesKey: ['female', 'male'],
        delay: function (idx, count) {
          return Math.random() * 400;
        }
      }
    }
  ]
});
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
