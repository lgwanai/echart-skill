<!-- bar-label-rotation — placeholder approach for reliable data injection -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart = echarts.init(document.getElementById("main"));
var option = {
  tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
  legend: { data: {{LEGEND}} },
  toolbox: { show: true, orient: "vertical", left: "right", top: "center",
    feature: { mark: { show: true }, dataView: { show: true, readOnly: false },
      magicType: { show: true, type: ["line","bar","stack"] },
      restore: { show: true }, saveAsImage: { show: true } } },
  xAxis: [{ type: "category", axisTick: { show: false }, data: {{CATEGORIES}} }],
  yAxis: [{ type: "value" }],
  series: {{SERIES}}
};
chart.setOption(option);
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
