<!-- scatter-map-brush — https://echarts.apache.org/examples/zh/editor.html?c=scatter-map-brush -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  backgroundColor: '#404a59',
  animation: true,
  animationDuration: 1000,
  animationEasing: 'cubicInOut',
  animationDurationUpdate: 1000,
  animationEasingUpdate: 'cubicInOut',
  title: [
    {
      text: '全国主要城市 PM 2.5',
      subtext: 'data from PM25.in',
      sublink: 'http://www.pm25.in',
      left: 'center',
      textStyle: {
        color: '#fff'
      }
    },
    {
      id: 'statistic',
      right: 120,
      top: 40,
      width: 100,
      textStyle: {
        color: '#fff',
        fontSize: 16
      }
    }
  ],
  toolbox: {
    iconStyle: {
      borderColor: '#fff'
    },
    emphasis: {
      iconStyle: {
        borderColor: '#b1e4ff'
      }
    }
  },
  brush: {
    outOfBrush: {
      color: '#abc'
    },
    brushStyle: {
      borderWidth: 2,
      color: 'rgba(0,0,0,0.2)',
      borderColor: 'rgba(0,0,0,0.5)'
    },
    seriesIndex: [0, 1],
    throttleType: 'debounce',
    throttleDelay: 300,
    geoIndex: 0
  },
  geo: {
    map: 'china',
    left: '10',
    right: '35%',
    center: [117.98561551896913, 31.205000490896193],
    zoom: 2.5,
    emphasis: {
      itemStyle: {
        areaColor: '#2a333d'
      },
      label: {
        show: false
      }
    },
    roam: true,
    itemStyle: {
      areaColor: '#323c48',
      borderColor: '#111'
    }
  },
  tooltip: {
    trigger: 'item'
  },
  grid: {
    right: 40,
    top: 100,
    bottom: 40,
    width: '30%'
  },
  xAxis: {
    type: 'value',
    scale: true,
    position: 'top',
    boundaryGap: false,
    splitLine: { show: false },
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { margin: 2, color: '#aaa' }
  },
  yAxis: {
    type: 'category',
    name: 'TOP 20',
    nameGap: 16,
    axisLine: { show: false, lineStyle: { color: '#ddd' } },
    axisTick: { show: false, lineStyle: { color: '#ddd' } },
    axisLabel: { interval: 0, color: '#ddd' },
    data: {{DATA}}
  },
  series: [
    {
      name: 'pm2.5',
      type: 'scatter',
      coordinateSystem: 'geo',
      data: convertedData[0],
      symbolSize: function (val) {
        return Math.max(val[2] / 10, 8);
      },
      label: {
        formatter: '{b}',
        position: 'right',
        show: false
      },
      itemStyle: {
        color: '#ddb926'
      },
      emphasis: {
        label: {
          show: true
        }
      }
    },
    {
      name: 'Top 5',
      type: 'effectScatter',
      coordinateSystem: 'geo',
      data: convertedData[1],
      symbolSize: function (val) {
        return Math.max(val[2] / 10, 8);
      },
      showEffectOn: 'emphasis',
      rippleEffect: {
        brushType: 'stroke'
      },
      emphasis: {
        scale: true
      },
      label: {
        formatter: '{b}',
        position: 'right',
        show: true
      },
      itemStyle: {
        color: '#f4e925',
        shadowBlur: 10,
        shadowColor: '#333'
      },
      zlevel: 1
    },
    {
      id: 'bar',
      zlevel: 2,
      type: 'bar',
      itemStyle: {
        color: '#ddb926'
      },
      data: {{DATA}}
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
