<!--

  Data: Uses {DATA} placeholder — replace with real data matching the option format

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
chart.setOption({
  backgroundColor: 'transparent',
  tooltip: {},
  visualMap: {
    type: 'piecewise',
    inverse: true,
    top: 10,
    left: 10,
    pieces: [
      {
        value: 0,
        color: COLORS[0]
      },
      {
        value: 1,
        color: COLORS[1]
      },
      {
        value: 2,
        color: COLORS[2]
      },
      {
        value: 3,
        color: COLORS[3]
      },
      {
        value: 4,
        color: COLORS[4]
      },
      {
        value: 5,
        color: COLORS[5]
      }
    ],
    borderColor: '#ccc',
    borderWidth: 2,
    backgroundColor: '#eee',
    dimension: 2,
    inRange: {
      color: COLORS,
      opacity: 0.7
    }
  },
  series: [
    {
      type: 'custom',
      coordinateSystem: 'bmap',
      renderItem: renderItem,
      animation: false,
      emphasis: {
        itemStyle: {
          color: 'yellow'
        }
      },
      encode: {
        tooltip: 2
      },
      data: data
    }
  ],
  bmap: {
    center: [116.46, 39.92],
    zoom: 11.8,
    roam: true,
    mapStyle: {
      styleJson: [
        {
          featureType: 'water',
          elementType: 'all',
          stylers: {
            color: '#d1d1d1'
          }
        },
        {
          featureType: 'land',
          elementType: 'all',
          stylers: {
            color: '#f3f3f3'
          }
        },
        {
          featureType: 'railway',
          elementType: 'all',
          stylers: {
            visibility: 'off'
          }
        },
        {
          featureType: 'highway',
          elementType: 'all',
          stylers: {
            color: '#999999'
          }
        },
        {
          featureType: 'highway',
          elementType: 'labels',
          stylers: {
            visibility: 'off'
          }
        },
        {
          featureType: 'arterial',
          elementType: 'geometry',
          stylers: {
            color: '#fefefe'
          }
        },
        {
          featureType: 'arterial',
          elementType: 'geometry.fill',
          stylers: {
            color: '#fefefe'
          }
        },
        {
          featureType: 'poi',
          elementType: 'all',
          stylers: {
            visibility: 'off'
          }
        },
        {
          featureType: 'green',
          elementType: 'all',
          stylers: {
            visibility: 'off'
          }
        },
        {
          featureType: 'subway',
          elementType: 'all',
          stylers: {
            visibility: 'off'
          }
        },
        {
          featureType: 'manmade',
          elementType: 'all',
          stylers: {
            color: '#d1d1d1'
          }
        },
        {
          featureType: 'local',
          elementType: 'all',
          stylers: {
            color: '#d1d1d1'
          }
        },
        {
          featureType: 'arterial',
          elementType: 'labels',
          stylers: {
            visibility: 'off'
          }
        },
        {
          featureType: 'boundary',
          elementType: 'all',
          stylers: {
            color: '#fefefe'
          }
        },
        {
          featureType: 'building',
          elementType: 'all',
          stylers: {
            color: '#d1d1d1'
          }
        },
        {
          featureType: 'label',
          elementType: 'labels.text.fill',
          stylers: {
            color: 'rgba(0,0,0,0)'
          }
        }
      ]
    }
  }
});
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
