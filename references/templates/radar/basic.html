<!--
  Template: radar/basic.html
  Chart Type: Radar (雷达图)
  Data Pattern: RADAR_VALUE
  Data Format: { indicators: [{name: string, max: number}, ...], series: [{name: string, value: number[]}, ...] }
  Covers: radar, radar2, radar-aqi, radar-custom, radar-multiple (5 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  legend: { data: {{LEGEND_NAMES}} },
  radar: {
    indicator: {{INDICATORS}},
    shape: '{{SHAPE}}',        // 'polygon' | 'circle'
    center: ['50%', '50%'],
    radius: '65%'
  },
  series: [{
    type: 'radar',
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
