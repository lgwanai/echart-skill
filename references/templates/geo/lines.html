<!--
  Template: geo/lines.html
  Chart Type: Geo Lines / Flights (地理飞线图)
  Data Format: { geoCoordMap: {"name": [lng,lat]}, flights: [[fromName, toName, value?], ...] }
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var geoCoordMap = {{GEO_COORD_MAP}} || {};
var rawFlights = {{FLIGHTS}};

function convertFlights(flights) {
  return flights.map(function(item) {
    return {
      fromName: item[0], toName: item[1], value: item[2] || 1,
      coords: [geoCoordMap[item[0]], geoCoordMap[item[1]]]
    };
  });
}

var option = {
  tooltip: { trigger: 'item', formatter: function(p) { return p.data ? p.data.fromName + ' -> ' + p.data.toName : ''; } },
  geo: {
    map: {{MAP_NAME}} || 'china', roam: true,
    label: { show: true, color: '#333' },
    itemStyle: { areaColor: '#f5f5f5', borderColor: '#999' },
    emphasis: { itemStyle: { areaColor: '#ffd54f' } }
  },
  series: [
    {
      type: 'lines',
      coordinateSystem: 'geo',
      polyline: false,
      effect: { show: true, period: 6, trailLength: 0.7, symbolSize: 3 },
      lineStyle: { width: 2, color: '#ff6b35', opacity: 0.8, curveness: 0.2 },
      data: convertFlights(rawFlights)
    }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
