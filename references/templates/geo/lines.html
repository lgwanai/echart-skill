<!--
  Template: geo/lines.html
  Chart Type: Geo Lines / Flights (地理飞线图)
  Data Pattern: LINES_COORDS
  Data Format: { geoCoordMap: {"name": [lng,lat]}, flights: [[fromName, toName, value?], ...] }
  Covers: geo-lines, lines-airline, lines-bmap, lines-bmap-bus, lines-bmap-effect,
          geo-svg-lines, lines3d-* (10+ examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var geoCoordMap = {{GEO_COORD_MAP}};  // {"name": [lng, lat], ...}
var rawFlights = {{FLIGHTS}};         // [["fromName", "toName", value], ...]
var effectData = {{EFFECT_DATA}};     // [{name, value: [lng, lat, num]}, ...] for effectScatter

function convertFlights(flights) {
  return flights.map(function(item) {
    return {
      fromName: item[0], toName: item[1], value: item[2] || 1,
      coords: [geoCoordMap[item[0]], geoCoordMap[item[1]]]
    };
  });
}

var option = {
  tooltip: { trigger: 'item', formatter: function(p) { return p.data ? p.data.fromName + ' -> ' + p.data.toName : ''; } },
  geo: {
    map: '{{MAP_NAME}}', roam: true,
    label: { show: false },
    itemStyle: { areaColor: '#323c48', borderColor: '#111' },
    emphasis: { itemStyle: { areaColor: '#2a333d' } }
  },
  series: [
    {
      type: 'lines',
      coordinateSystem: 'geo',
      polyline: false, effect: { show: true, period: 6, trailLength: 0.7, symbolSize: 3 },
      lineStyle: { width: 1, opacity: 0.6, curveness: 0.2 },
      data: convertFlights(rawFlights)
    },
    {
      type: 'effectScatter',
      coordinateSystem: 'geo',
      rippleEffect: { brushType: 'stroke' },
      symbolSize: function(val) { return val[2] / {{SIZE_SCALE}} || 8; },
      data: effectData,
      label: { show: true, position: 'right', formatter: '{b}' }
    }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
