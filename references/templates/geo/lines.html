<!--
  Template: geo/lines.html — matches official ECharts Migration example
  Data Format: GEO_COORD_MAP + FLIGHTS [[from, to, val], ...]
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:0;background:#404a59}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var geoCoordMap = {{GEO_COORD_MAP}} || {};
var rawData = {{FLIGHTS}};
var planePath = 'path://M1705.06,1318.313v-89.254l-319.9-221.799l0.073-208.063c0.521-84.662-26.629-121.796-63.961-121.491c-37.332-0.305-64.482,36.829-63.961,121.491l0.073,208.063l-319.9,221.799v89.254l330.343-157.288l12.238,241.308l-134.449,92.931l0.531,42.034l175.125-42.917l175.125,42.917l0.531-42.034l-134.449-92.931l12.238-241.308L1705.06,1318.313z';

var convertData = function(data) {
  return data.map(function(item) {
    var fc = geoCoordMap[item[0]], tc = geoCoordMap[item[1]];
    return fc && tc ? { fromName: item[0], toName: item[1], coords: [fc, tc] } : null;
  }).filter(Boolean);
};
var seriesData = convertData(rawData);
var option = {
  backgroundColor: '#404a59',
  title: { text: {{TITLE}}, left: 'center', textStyle: { color: '#fff' } },
  tooltip: { trigger: 'item', formatter: function(p) { return p.data ? p.data.fromName + ' → ' + p.data.toName : ''; } },
  geo: { map: {{MAP_NAME}} || 'china', roam: true, label: { show: false },
    itemStyle: { areaColor: '#323c48', borderColor: '#404a59' },
    emphasis: { label: { show: true }, itemStyle: { areaColor: '#2a333d' } } },
  series: [
    { type: 'lines', zlevel: 1, effect: { show: true, period: 6, trailLength: 0.7, color: '#fff', symbolSize: 3 },
      lineStyle: { color: '#a6c84c', width: 0, curveness: 0.2 }, data: seriesData },
    { type: 'lines', zlevel: 2, symbol: ['none', 'arrow'], symbolSize: 10,
      effect: { show: true, period: 6, trailLength: 0, symbol: planePath, symbolSize: 15 },
      lineStyle: { color: '#a6c84c', width: 1, opacity: 0.6, curveness: 0.2 }, data: seriesData },
    { type: 'effectScatter', coordinateSystem: 'geo', zlevel: 2, rippleEffect: { brushType: 'stroke' },
      label: { show: true, position: 'right', formatter: '{b}' }, symbolSize: function(v) { return v[2] / 8 || 8; },
      itemStyle: { color: '#a6c84c' },
      data: rawData.map(function(d) { var c = geoCoordMap[d[1]]; return c ? { name: d[1], value: c.concat([d[2]||1]) } : null; }).filter(Boolean) }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
