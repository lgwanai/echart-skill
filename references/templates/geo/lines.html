<!--
  Template: geo/lines.html
  Chart Type: Geo Lines (地理飞线图)
  Data Format: [[[lng1,lat1],[lng2,lat2]], ...] — direct coordinate pairs
  Matches official ECharts lines-airline example
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<!-- {{MAP_INLINE}} -->
<style>body{margin:0;padding:0;background:#003;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:700px}</style>
</head>
<body>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  backgroundColor: '#003',
  title: { text: {{TITLE}}, left: 'center', textStyle: { color: '#eee' } },
  tooltip: { formatter: function(p) { return 'Line ' + p.dataIndex; } },
  geo: {
    map: {{MAP_NAME}} || 'china', roam: true, silent: true,
    itemStyle: { borderColor: '#003', color: '#005' }
  },
  series: [{
    type: 'lines',
    coordinateSystem: 'geo',
    data: {{DATA}},
    large: true,
    lineStyle: { opacity: 0.2, width: 1, curveness: 0.3 },
    blendMode: 'lighter'
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
