<!--
  Template: pictorialBar/basic.html
  Chart Type: PictorialBar (象形柱图)
  Data Pattern: FLAT_ARRAY (with symbol config)
  Data Format: { categories: string[], values: number[] }
  Covers: pictorialBar-forest, pictorialBar-hill, pictorialBar-spirit, pictorialBar-vehicle,
          pictorialBar-velocity, pictorialBar-body-fill, pictorialBar-dotted,
          pictorialBar-bar-transition (8 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { trigger: 'axis' },
  grid: { left: '5%', right: '5%', bottom: '10%', top: '10%' },
  xAxis: { type: 'category', data: {{CATEGORIES}}, axisTick: { show: false }, axisLine: { show: false } },
  yAxis: { type: 'value', splitLine: { show: false }, axisLabel: { show: false }, axisTick: { show: false } },
  series: [{
    type: 'pictorialBar',
    symbol: '{{SYMBOL}}',          // 'path://...' | 'image://...' | 'circle' | 'rect'
    symbolSize: {{SYMBOL_SIZE}},    // [width, height] | number
    symbolRepeat: '{{SYMBOL_REPEAT}}',  // 'fixed' | true
    symbolBoundingData: {{SYMBOL_BOUNDING}},  // number (unit value per symbol)
    symbolClip: {{SYMBOL_CLIP}},    // true | false
    symbolPosition: '{{SYMBOL_POS}}',  // 'start' | 'end'
    symbolMargin: '{{SYMBOL_MARGIN}}',  // '5%' | number
    itemStyle: { color: {{COLOR}} },
    label: { show: {{LABEL_SHOW}}, position: 'top' },
    data: {{VALUES}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
