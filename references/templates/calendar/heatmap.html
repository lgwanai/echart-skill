<!--
  Template: calendar/heatmap.html
  Chart Type: Calendar Heatmap (日历热力图)
  Data Pattern: CALENDAR_VALUE
  Data Format: [[dateString, value], ...]  (dateString: 'YYYY-MM-DD')
  Covers: calendar-simple, calendar-heatmap, calendar-charts, calendar-horizontal,
          calendar-vertical, calendar-lunar, calendar-graph, calendar-effectscatter, calendar-pie (9 examples)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- {{ECHARTS_INLINE}} -->
<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head>
<body>
<div id="title" style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px">{{TITLE}}</div>
<div id="main"></div>
<script type="text/javascript">
var chart = echarts.init(document.getElementById('main'));
var option = {
  tooltip: { position: 'top', formatter: function(p) { return p.data[0] + ': ' + p.data[1]; } },
  visualMap: {
    min: {{VMIN}}, max: {{VMAX}},
    type: 'piecewise', orient: 'horizontal',
    left: 'center', top: 0,
    inRange: { color: ['#ebedf0', '#c6e48b', '#7bc96f', '#239a3b', '#196127'] }
  },
  calendar: {
    top: 50, left: 30, right: 30,
    cellSize: ['auto', 15],
    range: ['{{RANGE_START}}', '{{RANGE_END}}'],
    orient: '{{ORIENT}}',              // 'horizontal' | 'vertical'
    yearLabel: { show: true }, monthLabel: { show: true },
    dayLabel: { show: true, firstDay: 1 },
    splitLine: { show: true, lineStyle: { color: '#555', width: 1 } }
  },
  series: [{
    type: 'heatmap',
    coordinateSystem: 'calendar',
    data: {{DATA}}
  }]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
