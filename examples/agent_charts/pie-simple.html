<!-- pie-simple — https://echarts.apache.org/examples/zh/editor.html?c=pie-simple -->
<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="utf-8"><title>{TITLE}</title>
<!-- {ECHARTS_INLINE} -->

<style>body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#main{width:100%;height:600px}</style>
</head><body><div id="main"></div><script>
var chart=echarts.init(document.getElementById("main"));
chart.setOption({
  title: {
    text: 'Referer of a Website',
    subtext: 'Fake Data',
    left: 'center'
  },
  tooltip: {
    trigger: 'item'
  },
  legend: {
    orient: 'vertical',
    left: 'left'
  },
  series: [
    {
      name: 'Access From',
      type: 'pie',
      radius: '50%',
      data: [{"name": "\u641c\u7d22", "value": 1048.0}, {"name": "\u76f4\u63a5", "value": 735.0}, {"name": "\u90ae\u4ef6", "value": 580.0}, {"name": "\u8054\u76df", "value": 484.0}, {"name": "\u89c6\u9891", "value": 300.0}],
      emphasis: {
        itemStyle: {
          shadowBlur: 10,
          shadowOffsetX: 0,
          shadowColor: 'rgba(0, 0, 0, 0.5)'
        }
      }
    }
  ]
});
window.addEventListener("resize",function(){chart.resize();});
</script></body></html>
